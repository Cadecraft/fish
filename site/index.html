<!DOCTYPE html>
<html>
    <head>
        <title>fish</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/favicon.ico">
        <script src="scripts/constants.js"></script>
        <script defer src="scripts/rendering.js"></script>
        <script defer src="scripts/input.js"></script>
        <script defer src="scripts/updateState.js"></script>
        <script defer src="scripts/script.js"></script>
    </head>
    <body>
        <div class="center">
            <div class="infobar">
                <h1>fish</h1>
                <a target="_blank" href="https://github.com/Cadecraft/fish">about</a>
            </div>
            <div class="game">
                <canvas width="330" height="540" id="canvas">
                    A view of the fishing game
                </canvas>
                <div id="ui">
                    <div id="results">
                        <div class="separated">
                            <span>Results</span>
                            <div id="fishlist">
                            </div>
                        </div>
                        <div class="result-buttons">
                            <button id="share">Share</button>
                        </div>
                    </div>
                    <span id="hint">[space] start</span>
                    <span id="depth"></span>
                </div>
            </div>
        </div>
    </body>
</html>
